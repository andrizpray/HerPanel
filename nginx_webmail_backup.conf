# Nginx Webmail Configuration Backup
# File: /etc/nginx/sites-available/webmail
# Backup Date: $(date +%Y-%m-%d %H:%M:%S)

server {
    listen 8082;
    server_name localhost;
    root /var/www/html/webmail;
    index index.php index.html index.htm;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Enable gzip compression
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

    # Log files
    access_log /var/log/nginx/webmail.access.log;
    error_log /var/log/nginx/webmail.error.log;

    # Max upload size
    client_max_body_size 50M;
    client_body_timeout 60s;
    client_header_timeout 60s;

    # PHP processing
    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_script_name;
        fastcgi_read_timeout 300;
    }

    # Static files
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        log_not_found off;
    }

    # Deny access to sensitive files
    location ~ ^/(\.git|\.ht|\.svn|\.env|config.*\.php|.*\.sql|.*\.log) {
        deny all;
    }

    # Deny access to installer directory
    location ~ ^/installer {
        deny all;
    }

    # Deny access to config directory
    location ~ ^/config {
        deny all;
    }

    # Roundcube specific settings
    location ~ ^/(README|INSTALL|CHANGELOG|UPGRADING|LICENSE|LEGAL) {
        deny all;
    }

    # Enable directory listing
    autoindex on;
}